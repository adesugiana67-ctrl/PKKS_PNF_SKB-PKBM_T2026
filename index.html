<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Absensi PKBM IGI Sumedang</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Inter',sans-serif;margin:0;background:#f1f5f9}
header{background:#1e3a8a;color:#fff;padding:15px 25px;display:flex;justify-content:space-between;align-items:center}
button{padding:8px 15px;border:none;border-radius:6px;cursor:pointer;font-weight:600}
.btn-primary{background:#1e3a8a;color:#fff}
.btn-success{background:#059669;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 4px 6px rgba(0,0,0,0.05);margin-bottom:20px}
input,select{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
.toast{position:fixed;bottom:20px;right:20px;background:#1e3a8a;color:#fff;padding:10px 15px;border-radius:6px;display:none}
</style>
</head>
<body>

<header>
<h2>PKBM IGI SUMEDANG</h2>
<div>
<button class="btn-success" onclick="syncData()"><i class="fa fa-sync"></i> Sinkronisasi</button>
</div>
</header>

<div class="container">

<div class="card">
<h3>Input Absensi</h3>
<form id="formAbsensi">
<div class="grid">
<input type="text" id="nama" placeholder="Nama Siswa" required>
<select id="program" required>
<option value="">Program</option>
<option>Paket A</option>
<option>Paket B</option>
<option>Paket C</option>
</select>
<input type="date" id="tanggal" required>
<select id="status" required>
<option value="">Status</option>
<option>Hadir</option>
<option>Izin</option>
<option>Sakit</option>
<option>Alpa</option>
</select>
<input type="text" id="mapel" placeholder="Mata Pelajaran">
</div>
<br>
<button class="btn-primary" type="submit">Simpan</button>
</form>
</div>

<div class="card">
<h3>Riwayat Absensi</h3>
<table>
<thead>
<tr>
<th>Nama</th><th>Program</th><th>Tanggal</th><th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "YOUR_SCRIPT_URL";
let localData = [];

function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

function renderTable(){
const tbody=document.getElementById("tableBody");
tbody.innerHTML="";
localData.forEach(d=>{
tbody.innerHTML+=`<tr>
<td>${d.nama}</td>
<td>${d.program}</td>
<td>${d.tanggal}</td>
<td>${d.status}</td>
</tr>`;
});
}

document.getElementById("formAbsensi").addEventListener("submit",async function(e){
e.preventDefault();

const nama=document.getElementById("nama").value.trim();
const tanggal=document.getElementById("tanggal").value;

// CEK DUPLIKAT DI LOCAL
if(localData.some(d=>d.nama.toLowerCase()==nama.toLowerCase() && d.tanggal==tanggal)){
showToast("Duplikat di device ini!");
return;
}

const record={
id:Date.now().toString(),
nama:nama,
program:program.value,
mapel:mapel.value,
tanggal:tanggal,
status:status.value,
timestamp:Date.now()
};

localData.push(record);
renderTable();
showToast("Data tersimpan lokal. Klik Sinkronisasi.");
this.reset();
});

async function syncData(){
for(const record of localData){
await fetch(API_URL,{
method:"POST",
body:JSON.stringify({...record,action:"add"})
});
}
await loadFromServer();
showToast("Sinkronisasi selesai.");
}

async function loadFromServer(){
const res=await fetch(API_URL+"?action=get");
const data=await res.json();
localData=data.slice(1).map(r=>({
id:r[0],nama:r[1],program:r[2],mapel:r[3],tanggal:r[4],status:r[5],timestamp:r[7]
}));
renderTable();
}

loadFromServer();
</script>

</body>
</html>
