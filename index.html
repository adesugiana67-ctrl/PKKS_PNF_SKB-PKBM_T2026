<script type="module">
    // 1. Import module Firebase yang dibutuhkan (Termasuk Storage)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // 2. Konfigurasi Firebase Anda (Sesuaikan dengan data dari Firebase Console)
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "proyek-anda.firebaseapp.com",
        projectId: "proyek-anda",
        storageBucket: "proyek-anda.appspot.com", // PASTIKAN BAGIAN INI SUDAH TERISI
        messagingSenderId: "1234567890",
        appId: "1:12345:web:abcde"
    };

    // 3. Inisialisasi Firebase, Firestore, dan Storage
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 4. Fungsi Utama untuk mengunggah file ke Firebase Storage
    async function handleEvidenceUpload(event, schoolNpsn, componentId) {
        const file = event.target.files[0];
        if (!file) return;

        // Validasi ukuran file (Misal maksimal 5MB)
        if (file.size > 5 * 1024 * 1024) {
            alert("Ukuran file terlalu besar! Maksimal 5MB.");
            return;
        }

        try {
            console.log("Sedang mengunggah file...");
            
            // Membuat path/lokasi folder di Firebase Storage
            // Format folder: bukti_dukung/[NPSN_SEKOLAH]/[NAMA_KOMPONEN]_[NAMA_FILE]
            const storageRef = ref(storage, `bukti_dukung/${schoolNpsn}/${componentId}_${file.name}`);
            
            // Proses unggah file fisik ke Storage
            const snapshot = await uploadBytes(storageRef, file);
            
            // Mengambil URL Link unduhan file dari Storage setelah sukses diunggah
            const downloadURL = await getDownloadURL(snapshot.ref);
            
            console.log("File sukses terunggah. Link URL: ", downloadURL);

            // Simpan informasi nama file dan link URL tersebut ke Firestore
            await saveUrlToFirestore(schoolNpsn, componentId, file.name, downloadURL);
            
            alert(`Berhasil mengunggah berkas untuk ${componentId}!`);
            
            // Refresh/Muat ulang data di halaman web Anda agar tombol unduh muncul
            location.reload(); 

        } catch (error) {
            console.error("Gagal mengunggah ke Firebase Storage:", error);
            alert("Terjadi kesalahan saat mengunggah file.");
        }
    }

    // 5. Fungsi pendukung untuk menyimpan data teks URL ke Firestore
    async function saveUrlToFirestore(npsn, componentId, fileName, fileUrl) {
        try {
            const docRef = doc(db, "dataSatuan", npsn);
            
            // Membuat data dinamis berdasarkan komponen yang diisi
            let updatedData = {};
            updatedData[`${componentId}_file_name`] = fileName;
            updatedData[`${componentId}_file_url`] = fileUrl;
            updatedData["waktu_unggah"] = new Date().toISOString();

            // Simpan/Update dokumen di Firestore tanpa menghapus data lain yang sudah ada (merge: true)
            await setDoc(docRef, updatedData, { merge: true });
            console.log("Data URL berhasil disinkronkan ke Firestore.");
        } catch (error) {
            console.error("Gagal menyimpan URL ke Firestore:", error);
        }
    }

    // Ekspos fungsi ke window agar dapat dipanggil oleh tag HTML biasa (<input onchange="...">)
    window.handleEvidenceUpload = handleEvidenceUpload;
</script>
